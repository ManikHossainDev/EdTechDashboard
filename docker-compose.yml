services:
  admin-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mobilklar-admin-dashboard
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - mobilklar_shared
    expose:
      - "9500"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9500/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mobilklar_shared:
    external: true
